name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # Required for softprops/action-gh-release to create releases

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false   # Don't cancel other jobs if one fails — useful for debugging individual targets
      matrix:
        include:
          # linux/amd64 — native build on ubuntu-latest
          # webkit2_41 tag required: Ubuntu 24.04 dropped webkit2gtk-4.0, only 4.1 available
          - os: ubuntu-latest
            platform: linux/amd64
            wails_output: gamevault-go-linux-amd64
            artifact: gamevault-go-linux-amd64
            packages: ""
            wails_tags: webkit2_41

          # linux/arm64 — native arm64 runner (GitHub public preview Jan 2025)
          # NEVER use ubuntu-latest + aarch64-linux-gnu-gcc: Wails CGo cross-compile fails (issues #1921, #3719)
          - os: ubuntu-24.04-arm
            platform: linux/arm64
            wails_output: gamevault-go-linux-arm64
            artifact: gamevault-go-linux-arm64
            packages: ""
            wails_tags: webkit2_41

          # windows/amd64 — native Windows runner avoids Linux→Windows CGo cross-compile issues
          # GCC (mingw-w64) is pre-installed on windows-latest runners
          - os: windows-latest
            platform: windows/amd64
            wails_output: gamevault-go-windows-amd64.exe
            artifact: gamevault-go-windows-amd64.exe
            wails_tags: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.9.3

      - name: Install Linux system dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update -q
          # Ubuntu 24.04 (noble) dropped libwebkit2gtk-4.0-dev; use 4.1 instead
          # Wails v2.9+ supports webkit2gtk-4.1 on Ubuntu 24.04+
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev ${{ matrix.packages }}

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build
        env:
          CGO_ENABLED: "1"
        run: |
          TAGS="${{ matrix.wails_tags }}"
          if [ -n "$TAGS" ]; then
            wails build -platform ${{ matrix.platform }} -o ${{ matrix.wails_output }} -tags "$TAGS"
          else
            wails build -platform ${{ matrix.platform }} -o ${{ matrix.wails_output }}
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/bin/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
